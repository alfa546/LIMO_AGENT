<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIMO Agent - Claude Style</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Project Files -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="newChat()">
                    <span>+</span> New Chat
                </button>
            </div>
            <div class="chat-history-label">Recent</div>
            <div class="chat-history" id="chatHistory">
                <!-- History items load here -->
            </div>
        </div>

        <!-- Main Chat -->
        <div class="main-content">
            <div class="chat-container" id="chatContainer">
                <!-- Messages load here -->
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="prompt" placeholder="Ask LIMO anything..." rows="1"></textarea>
                    <button id="sendBtn" class="send-btn" onclick="handleSend(event)">
                        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main JS -->
    <script src="/static/js/app.js"></script>
</body>
</html>
